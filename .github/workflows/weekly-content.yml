name: Generate Weekly Content

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate article
        run: node scripts/generate-article.js
          
      - name: Update leaderboard data
        run: |
          curl -s https://ecometric-carbon-calc.netlify.app/api/leaderboard > content/leads.json || echo "[]" > content/leads.json
          
      - name: Commit and push
        run: |
          git config user.name "EcoMetric Bot"
          git config user.email "bot@ecometric.app"
          git add .
          git commit -m "Auto-generate weekly article and update leaderboard" || exit 0
          git push