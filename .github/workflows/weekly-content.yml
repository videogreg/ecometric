name: Generate Weekly Content

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Generate article
        run: node scripts/generate-article.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and push
        run: |
          git config user.name "EcoMetric Bot"
          git config user.email "bot@ecometric.app"
          git add .
          git commit -m "Auto-generate weekly article" || exit 0
          git push